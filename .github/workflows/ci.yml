name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Backend: lint + tests for each Python service
  # --------------------------------------------------------------------------
  backend:
    name: Backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [core, ai, chat, executor]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx ruff

      - name: Lint (ruff)
        run: ruff check . || true # warn-only until repo is fully clean

      - name: Run tests
        env:
          DEBUG: "true"
          SECRET_KEY: "ci-test-secret-key-not-for-prod"
          JWT_SHARED_SECRET: "ci-test-jwt-secret"
          DB_NAME: "postgres"
          DB_USER: "postgres"
          DB_PASSWORD: "postgres"
          DB_HOST: "localhost"
          DB_PORT: "5432"
          INTERNAL_SIGNING_SECRET: "ci-test-internal-secret"
          INTERNAL_REQUIRE_SIGNATURE: "false"
          GROQ_API_KEY: "ci-fake-key"
          CORE_SERVICE_URL: "http://localhost:8000"
          INTERNAL_API_KEY: "ci-test-internal-secret"
          LLM_PROVIDER: "groq"
          PYTHONPATH: "."
        run: |
          if [ -d tests ]; then
            pytest -q --maxfail=1 || exit_code=$?
            exit ${exit_code:-0}
          else
            echo "No tests directory; skipping."
          fi

  # --------------------------------------------------------------------------
  # Frontend: lint + build
  # --------------------------------------------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_URL: "http://localhost"
        run: npm run build
