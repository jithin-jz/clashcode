name: Deploy to AWS EKS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: clashcode-eks

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [core, chat, ai, analytics, executor]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          push: true
          provenance: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/clashcode-${{ matrix.service }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/clashcode-${{ matrix.service }}:prod
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/clashcode-${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  rollout:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Pin images to immutable SHA tag and apply
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd infra/k8s/overlays/prod
          for svc in core chat ai analytics executor; do
            kustomize edit set image $svc=$ECR_REGISTRY/clashcode-$svc:$TAG
          done
          kustomize build . | kubectl apply -f -
          kubectl -n clashcode rollout status deploy/core      --timeout=5m
          kubectl -n clashcode rollout status deploy/chat      --timeout=5m
          kubectl -n clashcode rollout status deploy/ai        --timeout=5m
          kubectl -n clashcode rollout status deploy/analytics --timeout=5m
          kubectl -n clashcode rollout status deploy/executor  --timeout=5m
          kubectl -n clashcode rollout status deploy/worker    --timeout=5m
          kubectl -n clashcode rollout status deploy/beat      --timeout=3m
