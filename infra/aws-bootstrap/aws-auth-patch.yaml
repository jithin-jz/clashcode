apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-auth
  namespace: kube-system
data:
  mapRoles: |
    - rolearn: arn:aws:iam::317451122305:role/clashcode-eks-node-role
      groups:
        - system:bootstrappers
        - system:nodes
      username: system:node:{{EC2PrivateDNSName}}
    - rolearn: arn:aws:iam::317451122305:role/GitHubActionsDeploy
      username: github-actions
      groups:
        - clashcode:deployers
