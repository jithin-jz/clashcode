apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: clashcode-deployer
rules:
  # Read all (so we can `kubectl get`/describe during rollout)
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps", "networking.k8s.io", "policy", "autoscaling", "batch"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

  # Write the things kustomize apply will touch
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "namespaces"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["create", "update", "patch", "delete"]

  # rollout status needs to read pods
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clashcode-deployer
subjects:
  - kind: Group
    name: clashcode:deployers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: clashcode-deployer
  apiGroup: rbac.authorization.k8s.io
