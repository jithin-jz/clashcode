apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: clashcode
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: backend-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        # AWS Secrets Manager secret containing one JSON document with all keys.
        # Each top-level JSON property becomes a key in the resulting k8s Secret.
        key: clashcode/prod/backend
