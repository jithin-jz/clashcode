apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        # Uses the IRSA service account 'external-secrets' in the
        # 'external-secrets' namespace. Annotate that SA with
        # eks.amazonaws.com/role-arn=<role-arn> after creating the IAM role.
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
