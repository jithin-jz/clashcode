# Horizontal Pod Autoscalers and Pod Disruption Budgets.
# HPA targets are conservative; tune after observing real load.

# ---------------- HPAs ----------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: core
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: core
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chat
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: executor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: executor
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

# ---------------- PDBs ----------------
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: core
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: core
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chat
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: chat
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: ai
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: executor
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: executor
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: worker
