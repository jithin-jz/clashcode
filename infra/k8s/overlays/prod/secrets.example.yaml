# Template for the prod backend secret. Copy to `secrets.yaml`, fill in real values,
# and DO NOT COMMIT. The real `secrets.yaml` is gitignored.
#
# Recommended long-term: replace with External Secrets Operator + AWS Secrets Manager
# or Sealed Secrets, and remove this kustomize-generated Secret entirely.

apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
type: Opaque
stringData:
  # Base Config
  SECRET_KEY: "REPLACE_WITH_DJANGO_SECRET_KEY"
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  FRONTEND_URL: "https://your-frontend.example.com"
  CORS_ALLOWED_ORIGINS: "https://your-frontend.example.com"
  CSRF_TRUSTED_ORIGINS: "https://your-frontend.example.com"
  SECURE_SSL_REDIRECT: "True"

  # Database & Redis
  DB_HOST: "REPLACE_WITH_DB_HOST"
  DB_PORT: "5432"
  DB_NAME: "postgres"
  DB_USER: "REPLACE_WITH_DB_USER"
  DB_PASSWORD: "REPLACE_WITH_DB_PASSWORD"
  DB_SSLMODE: "require"
  REDIS_URL: "redis://REPLACE_WITH_REDIS_HOST:6379/0"
  DYNAMODB_TABLE: "clashcode-prod-chat-messages"

  # Email Configuration
  EMAIL_BACKEND: "django.core.mail.backends.smtp.EmailBackend"
  EMAIL_HOST: "smtp.gmail.com"
  EMAIL_PORT: "587"
  EMAIL_USE_TLS: "True"
  EMAIL_HOST_USER: "REPLACE_WITH_EMAIL"
  EMAIL_HOST_PASSWORD: "REPLACE_WITH_APP_PASSWORD"
  DEFAULT_FROM_EMAIL: "CLASHCODE <REPLACE_WITH_EMAIL>"
  OTP_EMAIL_ASYNC: "true"

  # Cloudinary Configuration
  CLOUDINARY_CLOUD_NAME: "REPLACE_WITH_CLOUD_NAME"
  CLOUDINARY_API_KEY: "REPLACE_WITH_API_KEY"
  CLOUDINARY_API_SECRET: "REPLACE_WITH_API_SECRET"

  # AWS Credentials — prefer IRSA (IAM Roles for Service Accounts) instead of static keys
  AWS_REGION: "ap-south-1"
  AWS_ACCESS_KEY_ID: "REPLACE_OR_USE_IRSA"
  AWS_SECRET_ACCESS_KEY: "REPLACE_OR_USE_IRSA"

  # JWT Keys (PEM)
  JWT_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_PUBLIC_KEY
    -----END PUBLIC KEY-----
  JWT_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_PRIVATE_KEY
    -----END RSA PRIVATE KEY-----

  # Internal API Authentication
  INTERNAL_API_KEY: "REPLACE_WITH_INTERNAL_API_KEY"
  INTERNAL_SIGNING_SECRET: "REPLACE_WITH_INTERNAL_SIGNING_SECRET"
  INTERNAL_REQUIRE_SIGNATURE: "true"

  # OAuth Configuration
  GITHUB_CLIENT_ID: "REPLACE_WITH_GITHUB_CLIENT_ID"
  GITHUB_CLIENT_SECRET: "REPLACE_WITH_GITHUB_CLIENT_SECRET"
  GOOGLE_CLIENT_ID: "REPLACE_WITH_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_WITH_GOOGLE_CLIENT_SECRET"

  # Razorpay Configuration
  RAZORPAY_KEY_ID: "REPLACE_WITH_RAZORPAY_KEY_ID"
  RAZORPAY_KEY_SECRET: "REPLACE_WITH_RAZORPAY_KEY_SECRET"

  # AI Service Config
  CORE_SERVICE_URL: "http://core-service:8000"
  GROQ_API_KEY: "REPLACE_WITH_GROQ_API_KEY"
  MODEL_NAME: "llama-3.3-70b-versatile"
  OPENAI_API_BASE: "https://api.groq.com/openai/v1"
  PINECONE_API_KEY: "REPLACE_WITH_PINECONE_API_KEY"
  PINECONE_INDEX_NAME: "clashcode"
  EMBEDDING_MODEL: "llama-text-embed-v2"
  CORS_ORIGINS: "*"
